services:
  genesis-aio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genesis-aio
    image: genesis/genesis-aio:latest
    pull_policy: build
    # Load your API keys and secrets from the root .env file
    env_file:
      - .env
    ports:
      - "3000:3000" # Frontend
      - "8000:8000" # Backend
    volumes:
      - database_data:/app/database
      - workspace_data:/app/workspaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  database_data:
  workspace_data:
